name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Cache F* toolchain
        id: cache-fstar
        uses: actions/cache@v4
        with:
          path: fstar
          key: fstar-release-v2026.04.17-linux-x86_64

      - name: Install F*
        if: steps.cache-fstar.outputs.cache-hit != 'true'
        run: ./setup.sh

      - name: Show F* version
        run: fstar/bin/fstar.exe --version

      - name: Verify all modules
        run: make -j$(nproc)

      - name: Extract to C
        run: make extract

      - name: Compile snapshot
        run: make -C mark-and-sweep/snapshot

  snapshot-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Cache F* toolchain
        id: cache-fstar
        uses: actions/cache@v4
        with:
          path: fstar
          key: fstar-release-v2026.04.17-linux-x86_64

      - name: Install F*
        if: steps.cache-fstar.outputs.cache-hit != 'true'
        run: ./setup.sh

      - name: Regenerate snapshot
        run: make snapshot

      - name: Check snapshot is up to date
        run: |
          if ! git diff --quiet mark-and-sweep/snapshot/; then
            echo "::warning::Snapshot is out of date. Run 'make snapshot' and commit."
            git diff --stat mark-and-sweep/snapshot/
          fi
